name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ocfjmrnftggmaqyyhzmf

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Google OAuth start
        run: supabase functions deploy google-oauth-start --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Google OAuth status
        run: supabase functions deploy google-oauth-status --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Google OAuth disconnect
        run: supabase functions deploy google-oauth-disconnect --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Google OAuth callback
        run: supabase functions deploy google-oauth-callback --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy default workspace provisioner
        run: supabase functions deploy provision-default-workspace --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Digital Specialist lifecycle controls
        run: supabase functions deploy manage-digital-specialist --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy authenticated manual trigger
        run: supabase functions deploy start-workflow-execution --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy automated system trigger
        run: supabase functions deploy start-system-execution --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy per-integration Google Calendar intake
        run: supabase functions deploy poll-google-calendar-events --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy multi-tenant Google Calendar intake
        run: supabase functions deploy poll-all-google-calendar-events --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy Gmail follow up draft creation
        run: supabase functions deploy create-google-gmail-draft --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy Gmail draft editing
        run: supabase functions deploy update-google-gmail-draft --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy workflow completion callback
        run: supabase functions deploy complete-workflow-execution --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy workflow output review
        run: supabase functions deploy review-workflow-output --project-ref "$SUPABASE_PROJECT_ID"
