name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ocfjmrnftggmaqyyhzmf

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Google OAuth start
        run: supabase functions deploy google-oauth-start --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy authenticated manual trigger
        run: supabase functions deploy start-workflow-execution --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy automated system trigger
        run: supabase functions deploy start-system-execution --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
